<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinCompass | Личный кабинет</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Inter,system-ui; }
body{ background:#f5f7fb; color:#222; }
header{ height:70px; background:white; display:flex; align-items:center; justify-content:center; position:relative; box-shadow:0 3px 20px rgba(0,0,0,0.05);}
.logo-title{ position:absolute; left:40px; font-size:22px; font-weight:800; color:#222;}
.nav-tabs{ display:flex; gap:25px; margin-bottom:20px;}
.nav-tabs button{ border:none; background:none; font-size:15px; cursor:pointer; padding:8px 16px; border-radius:8px; transition:0.3s;}
.nav-tabs button.active{ background:#4b6cff; color:white;}
.container{ max-width:1100px; margin:auto; padding:20px;}
.section{ display:none;}
.section.active{ display:block;}
h2{ margin-bottom:20px;}
.form{ background:white; padding:25px; border-radius:14px; box-shadow:0 10px 25px rgba(0,0,0,0.05);}
.form input, .form select{ width:100%; padding:13px; margin-bottom:18px; border:1px solid #ddd; border-radius:8px; font-size:14px;}
.main-btn{ width:100%; padding:14px; border:none; background:#4b6cff; color:white; border-radius:8px; cursor:pointer; font-size:15px; font-weight:600;}
.cancel-btn{ width:100%; margin-top:10px; padding:10px; border:none; background:#eee; color:#666; border-radius:8px; cursor:pointer; display:none;}
table{ width:100%; border-collapse:collapse; background:white; border-radius:12px; overflow:hidden; box-shadow:0 10px 25px rgba(0,0,0,0.04);}
th,td{ padding:14px; border-bottom:1px solid #eee;}
th{ background:#fafafa; text-align:left; color:#777; font-size:13px;}
.edit-btn{ background:#f39c12; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; margin-right:5px;}
.delete-btn{ background:#ff4b4b; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;}
.stats{ display:grid; grid-template-columns:1fr 1fr; gap:25px;}
.chart-wrap{ grid-column:1 / 3; background:white; padding:30px; border-radius:14px; box-shadow:0 10px 25px rgba(0,0,0,0.05); max-height:450px; display:flex; justify-content:center;}
.card{ background:white; padding:30px; border-radius:14px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.05);}
.card-title{ color:#777; font-size:14px;}
.card-value{ font-size:28px; font-weight:700; margin-top:8px;}
.tools{ margin-top:20px; display:flex; gap:10px;}
.tools button{ padding:10px 15px; border:none; border-radius:6px; background:#eee; cursor:pointer;}
.notify{ position:fixed; bottom:20px; left:50%; transform:translate(-50%,20px); background:#222; color:white; padding:14px 22px; border-radius:10px; opacity:0; transition:0.4s; pointer-events:none; z-index:1000;}
.notify.show{ opacity:1; transform:translate(-50%,0);}

/* Пользовательская панель */
.user-panel{ margin-bottom:20px; background:white; padding:10px 15px; border-radius:14px; box-shadow:0 10px 25px rgba(0,0,0,0.05); display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap;}
.user-panel span{ font-weight:600;}
.logout-btn{ background:#ff4b4b; padding:6px 12px; border:none; border-radius:6px; color:white; cursor:pointer; font-size:14px;}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
<div class="logo-title">CoinCompass</div>
</header>

<div class="container">

<!-- Авторизация -->
<div id="auth-section" class="section active">
    <h2>Авторизация</h2>
    <div class="form">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Пароль">
        <button class="main-btn" onclick="login()">Войти</button>
        <button class="main-btn" onclick="register()" style="background:#2ecc71; margin-top:10px;">Регистрация</button>
    </div>
</div>

<!-- Личный кабинет -->
<div id="dashboard-section" class="section">
    <div class="user-panel">
        <span id="userEmail"></span>
        <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>

    <!-- Навигация -->
    <div class="nav-tabs">
        <button class="tab active" onclick="showSection('add', this)">Добавить</button>
        <button class="tab" onclick="showSection('history', this)">История</button>
        <button class="tab" onclick="showSection('stats', this)">Статистика</button>
        <button class="tab" onclick="showSection('months', this)">По месяцам</button>
    </div>

    <!-- Разделы -->
    <div id="add" class="section active">
        <h2>Добавить расход</h2>
        <div class="form">
            <input id="amount" type="number" placeholder="Сумма">
            <select id="category">
                <option>Еда</option>
                <option>Транспорт</option>
                <option>Развлечения</option>
                <option>Жилье</option>
                <option>Покупки</option>
                <option>Прочее</option>
            </select>
            <input id="desc" placeholder="Описание">
            <button class="main-btn" onclick="saveExpense()">Сохранить расход</button>
        </div>
    </div>

    <div id="history" class="section">
        <h2>История расходов</h2>
        <table>
            <thead><tr><th>Дата</th><th>Категория</th><th>Сумма</th><th>Описание</th><th>Действие</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <div id="stats" class="section">
        <h2>Статистика</h2>
        <div class="stats">
            <div class="card"><div class="card-title">Всего расходов</div><div id="total" class="card-value">0 ₽</div></div>
            <div class="card"><div class="card-title">Операций</div><div id="count" class="card-value">0</div></div>
            <div class="chart-wrap"><canvas id="chart"></canvas></div>
        </div>
    </div>

    <div id="months" class="section">
        <h2>Расходы по месяцам</h2>
        <table>
            <thead><tr><th>Месяц</th><th>Сумма</th></tr></thead>
            <tbody id="monthBody"></tbody>
        </table>
    </div>
</div>

<div id="notify" class="notify">Готово</div>

<script>
// Firebase конфиг
const firebaseConfig = {
  apiKey: "AIzaSyDUKNKvSuoPYrCe7d6Xnc8rIdfq7ZMVf2k",
  authDomain: "coincompass-hack.firebaseapp.com",
  projectId: "coincompass-hack",
  storageBucket: "coincompass-hack.firebasestorage.app",
  messagingSenderId: "972639367478",
  appId: "1:972639367478:web:49ce98b93c2cabd3250397",
  databaseURL: "https://coincompass-hack-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let expenses = [];
let chart = null;
let currentUser = null;

// Уведомления
function notify(text){
    const n=document.getElementById("notify");
    n.innerText=text;
    n.classList.add("show");
    setTimeout(()=>{ n.classList.remove("show"); },2000);
}

// Авторизация
function register(){
    const email=document.getElementById("email").value;
    const password=document.getElementById("password").value;
    if(!email||!password){ notify("Введите email и пароль"); return; }
    auth.createUserWithEmailAndPassword(email,password)
        .then(u=>showDashboard(u.user))
        .catch(err=>notify(err.message));
}
function login(){
    const email=document.getElementById("email").value;
    const password=document.getElementById("password").value;
    if(!email||!password){ notify("Введите email и пароль"); return; }
    auth.signInWithEmailAndPassword(email,password)
        .then(u=>showDashboard(u.user))
        .catch(err=>notify(err.message));
}
function logout(){ auth.signOut().then(()=>location.reload()); }

auth.onAuthStateChanged(user=>{
    if(user) showDashboard(user);
    else document.getElementById("auth-section").classList.add("active");
});

// Показ кабинета
function showDashboard(user){
    currentUser=user;
    document.getElementById("auth-section").classList.remove("active");
    document.getElementById("dashboard-section").classList.add("active");
    document.getElementById("userEmail").innerText=user.email;
    db.ref("users/"+user.uid+"/expenses").on("value", snapshot=>{
        const data=snapshot.val();
        expenses=data? Object.keys(data).map(k=>({...data[k],firebaseId:k})): [];
        render();
    });
}

// Вкладки
function showSection(id, btn){
    document.querySelectorAll(".dashboard-section,.section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll(".nav-tabs button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}

// Добавление расходов
function saveExpense(){
    const amount=document.getElementById("amount").value;
    const category=document.getElementById("category").value;
    const desc=document.getElementById("desc").value||"-";
    if(!amount) return;
    db.ref("users/"+currentUser.uid+"/expenses").push({
        amount:Number(amount),
        category,
        desc,
        date:new Date().toISOString()
    });
    notify("Расход сохранён");
    document.getElementById("amount").value="";
    document.getElementById("desc").value="";
}

// Удаление
function del(id){
    if(confirm("Удалить запись?"))
        db.ref("users/"+currentUser.uid+"/expenses/"+id).remove();
}

// Рендер
function render(){
    renderHistory();
    renderStats();
}

function renderHistory(){
    let html="";
    expenses.slice().reverse().forEach(e=>{
        const date=new Date(e.date).toLocaleDateString();
        html+=`<tr><td>${date}</td><td>${e.category}</td><td>${e.amount} ₽</td><td>${e.desc}</td>
        <td><button class="edit-btn" onclick="editExpense('${e.firebaseId}')">Изменить</button>
        <button class="delete-btn" onclick="del('${e.firebaseId}')">Удалить</button></td></tr>`;
    });
    document.getElementById("historyBody").innerHTML=html;
}

function editExpense(id){
    const e=expenses.find(x=>x.firebaseId===id);
    if(!e)return;
    document.getElementById("amount").value=e.amount;
    document.getElementById("category").value=e.category;
    document.getElementById("desc").value=e.desc;
    del(id);
}

function renderStats(){
    let total=0; const cats={};
    expenses.forEach(e=>{ total+=e.amount; cats[e.category]=(cats[e.category]||0)+e.amount; });
    document.getElementById("total").innerText=total+" ₽";
    document.getElementById("count").innerText=expenses.length;

    const ctx=document.getElementById("chart");
    if(chart) chart.destroy();
    if(expenses.length>0){
        chart=new Chart(ctx,{
            type:"doughnut",
            data:{ labels:Object.keys(cats), datasets:[{ data:Object.values(cats), backgroundColor:['#4b6cff','#ff4b4b','#ffb84b','#2ecc71','#9b59b6','#34495e'] }] },
            options:{ maintainAspectRatio:false, animation:{ animateRotate:true, animateScale:true }, plugins:{legend:{position:"bottom"}} }
        });
    }
}
</script>
</body>
</html>
